name: Render paper caption video

on:
  workflow_dispatch:
    inputs:
      paper_txt_path:
        description: "Path to a committed .txt paper input"
        required: true
        type: choice
        default: "paper_inputs/thyroid.txt"
        options:
          - "paper_inputs/thyroid.txt"
      project_id:
        description: "Project/output id used for artifact paths"
        required: true
        default: "paper-caption-video"
      duration_seconds:
        description: "Video duration in seconds"
        required: true
        default: "60"
  push:
    paths:
      - "paper_inputs/**/*.txt"
      - "scripts/render_paper_caption_video.py"
      - "remotion-composer/**"
      - ".github/workflows/render-paper-caption-video.yml"

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install render dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          python -m pip install --upgrade pip
          python -m pip install pillow
          cd remotion-composer
          npm ci

      - name: Resolve workflow inputs
        id: inputs
        shell: bash
        run: |
          PAPER_PATH="${{ github.event.inputs.paper_txt_path }}"
          PROJECT_ID="${{ github.event.inputs.project_id }}"
          DURATION="${{ github.event.inputs.duration_seconds }}"
          if [ -z "$PAPER_PATH" ]; then
            if [ "$GITHUB_EVENT_NAME" = "push" ]; then
              PAPER_PATH=$(python -c '
          import json
          import os
          import sys
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          changed = []
          for commit in event.get("commits", []):
              for key in ("added", "modified"):
                  changed.extend(commit.get(key, []))

          paper_inputs = sorted({
              path for path in changed
              if path.startswith("paper_inputs/") and path.endswith(".txt")
          })
          paper_input_list = ", ".join(paper_inputs) or "none"
          if len(paper_inputs) > 1:
              print(
                  "Expected exactly one changed paper input on push; "
                  f"found {len(paper_inputs)}: {paper_input_list}",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(paper_inputs[0] if paper_inputs else "paper_inputs/thyroid.txt")
          ')
            else
              PAPER_PATH="paper_inputs/thyroid.txt"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="paper-caption-video"
          fi
          if [ -z "$DURATION" ]; then
            DURATION="60"
          fi
          if [ ! -f "$PAPER_PATH" ]; then
            echo "Paper input not found: $PAPER_PATH" >&2
            echo "Commit a .txt file under paper_inputs/ or pass paper_txt_path manually." >&2
            exit 1
          fi
          echo "paper_path=$PAPER_PATH" >> "$GITHUB_OUTPUT"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

      - name: Render caption video via OpenMontage tool
        run: |
          python - <<'PY'
          import json
          from tools.video.paper_caption_render import PaperCaptionRender

          result = PaperCaptionRender().execute({
              "paper_path": "${{ steps.inputs.outputs.paper_path }}",
              "project_id": "${{ steps.inputs.outputs.project_id }}",
              "duration_seconds": int("${{ steps.inputs.outputs.duration }}"),
              "output_path": "projects/${{ steps.inputs.outputs.project_id }}/renders/final.mp4",
              "story_json_path": "projects/${{ steps.inputs.outputs.project_id }}/artifacts/story.json",
          })
          print(json.dumps({
              "success": result.success,
              "data": result.data,
              "artifacts": result.artifacts,
              "error": result.error,
          }, indent=2))
          if not result.success:
              raise SystemExit(result.error or "paper_caption_render failed")
          PY

      - name: Verify rendered MP4
        run: |
          ffprobe -v error \
            -select_streams v:0 \
            -show_entries stream=codec_name,width,height,r_frame_rate,duration \
            -show_entries format=duration,size \
            -of json \
            "projects/${{ steps.inputs.outputs.project_id }}/renders/final.mp4"

      - name: Upload rendered video artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-caption-video-${{ steps.inputs.outputs.project_id }}
          path: |
            projects/${{ steps.inputs.outputs.project_id }}/renders/final.mp4
            projects/${{ steps.inputs.outputs.project_id }}/artifacts/story.json
            projects/${{ steps.inputs.outputs.project_id }}/artifacts/remotion-props.json
          if-no-files-found: error
