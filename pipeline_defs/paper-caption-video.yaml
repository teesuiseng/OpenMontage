name: paper-caption-video
version: "1.0"
description: >
  Caption-led paper explainer pipeline from a committed .txt paper input. Designed for
  GitHub/Codex environments where binary MP4 files should not be committed. The final
  video is rendered by GitHub Actions and uploaded as an artifact.
category: generated
stability: beta

default_checkpoint_policy: auto_noncreative

metadata:
  input_contract:
    primary_input: paper_txt
    accepted_extensions: [".txt"]
    recommended_location: paper_inputs/
    delivery_mode: github_actions_artifact
    binary_policy: "Do not commit generated MP4 files; upload them as workflow artifacts."
  limitations:
    - "The default renderer is heuristic and caption-led; it does not perform deep scientific peer review."
    - "No TTS/audio is generated unless a future provider-backed stage is added."
    - "The MP4 is not committed to git; it is uploaded as a GitHub Actions artifact."
    - "Workflow dispatch cannot upload arbitrary files directly; commit the .txt under paper_inputs/ first, or run on push."
    - "If GitHub Actions is disabled, render manually with scripts/render_paper_caption_video.py."
  render_workflow: .github/workflows/render-paper-caption-video.yml
  renderer_script: scripts/render_paper_caption_video.py
  openmontage_tool: paper_caption_render

required_skills:
  - pipelines/paper-caption-video/executive-producer
  - pipelines/paper-caption-video/research-director
  - pipelines/explainer/script-director
  - pipelines/explainer/scene-director
  - pipelines/explainer/asset-director
  - pipelines/explainer/edit-director
  - pipelines/explainer/compose-director
  - meta/reviewer
  - meta/checkpoint-protocol

orchestration:
  mode: github-actions-render
  skill: pipelines/paper-caption-video/executive-producer
  budget_default_usd: 0.00

compatible_playbooks:
  recommended:
    - clean-professional
    - minimalist-diagram
  custom_allowed: false

stages:
  - name: research
    skill: pipelines/paper-caption-video/research-director
    produces:
      - research_brief
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Paper text file exists and is readable
      - Title/abstract-like opening is extracted when present
      - Candidate claims are clearly marked as heuristic, not verified facts
      - Limitations are carried forward
    success_criteria:
      - Schema-valid research_brief or script metadata created by renderer
      - Paper input path recorded

  - name: script
    skill: pipelines/explainer/script-director
    required_artifacts_in:
      - research_brief
    produces:
      - script
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Caption script fits target duration
      - Claims come from the input text
      - Limitations/disclaimer card included
    success_criteria:
      - Schema-valid script with timed sections
      - Total duration matches requested duration
      - LinkedIn story quality gate passes before render

  - name: scene_plan
    skill: pipelines/explainer/scene-director
    required_artifacts_in:
      - script
    produces:
      - scene_plan
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Full script duration covered
      - At least 3 visual beats
      - Caption-led style is clear and readable
    success_criteria:
      - Scene plan covers full duration

  - name: assets
    skill: pipelines/explainer/asset-director
    required_artifacts_in:
      - scene_plan
      - script
    produces:
      - asset_manifest
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - No binary media committed
      - Artifact upload path documented
    success_criteria:
      - Render props/data exist or can be generated by script

  - name: edit
    skill: pipelines/explainer/edit-director
    required_artifacts_in:
      - scene_plan
      - asset_manifest
    produces:
      - edit_decisions
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Timeline has no gaps
      - Captions remain readable
    success_criteria:
      - Full video duration covered

  - name: compose
    skill: pipelines/explainer/compose-director
    required_artifacts_in:
      - edit_decisions
      - asset_manifest
    produces:
      - render_report
      - final_review
    tools_available:
      - paper_caption_render
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - GitHub Actions artifact uploaded
      - ffprobe verifies MP4
      - No binary MP4 included in PR diff
    success_criteria:
      - Workflow artifact named paper-caption-video exists
      - Render report records artifact delivery route
